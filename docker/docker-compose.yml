name: ifnodes

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ifnodes
      POSTGRES_PASSWORD: ifnodes_dev
      POSTGRES_DB: ifnodes
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ifnodes -d ifnodes']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
